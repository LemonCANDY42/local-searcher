name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: MCP smoke test
        run: npm run test:mcp

      - name: Bin help smoke test
        run: |
          node bin/agent-searchkit-search --help
          node bin/agent-searchkit-research --help
          node bin/agent-searchkit-mcp --help

      - name: Rollout contract
        run: npm run test:rollout

      - name: Package dry run
        run: npm pack --dry-run
